name: python-agent-tests

on:
  push:
    paths:
      - "agent/**"
      - ".github/workflows/python-agent-tests.yml"
  pull_request:
    paths:
      - "agent/**"
      - ".github/workflows/python-agent-tests.yml"
  workflow_dispatch:

jobs:
  test-python-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "agent/agent/requirements.txt"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r agent/agent/requirements.txt

      - name: Run Python agent unit tests
        run: python -m unittest discover -s agent/agent/tests -p "test_*.py" -v
