name: python-agent-tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: python-agent-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-python-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "agent/agent/requirements.txt"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r agent/agent/requirements.txt

      - name: Run Python agent unit tests
        run: python -m unittest discover -s agent/agent/tests -p "test_*.py" -v

      - name: Generate health snapshot report
        run: npm run health:snapshot:quiet

      - name: Upload health snapshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-snapshot-artifacts
          path: logs/health/*.md
