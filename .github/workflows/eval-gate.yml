name: eval-gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: eval-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax checks
        run: npm run check

      - name: Run evaluation baseline gate (PR)
        if: github.event_name == 'pull_request'
        run: |
          npm run eval:dataset:stress
          npm run eval:collect
          npm run eval:run
          npm run eval:history
          node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('eval/report.json','utf8'));const score=Number((r.summary||{}).overallScore||0);if(score<40){console.error('[EvalBaselineGate] FAIL overallScore',score,'< 40');process.exit(1)};console.log('[EvalBaselineGate] PASS overallScore='+score);"

      - name: Run evaluation CI gate (manual strict)
        if: github.event_name != 'pull_request'
        run: npm run eval:ci
        env:
          EVAL_GATE_MIN_SCORE: '85'
          EVAL_GATE_ALLOW_REGRESSION: 'false'
          EVAL_FLAKE_RUNS: '3'
          EVAL_FLAKE_ALLOWED_SPREAD: '5'

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-artifacts
          path: |
            eval/report.json
            eval/report.md
            eval/history.jsonl
            eval/trend.json
            eval/flake-report.json
            eval/flake-report.md
